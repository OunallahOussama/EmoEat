services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emoeat-php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-emoeat}
      - DB_USER=${DB_USER:-emoeat_user}
      - DB_PASS=${DB_PASS:-EmoEat2026!}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
    networks:
      - emoeat-net

  mysql:
    image: mysql:8.0
    container_name: emoeat-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass2026}
      MYSQL_DATABASE: ${DB_NAME:-emoeat}
      MYSQL_USER: ${DB_USER:-emoeat_user}
      MYSQL_PASSWORD: ${DB_PASS:-EmoEat2026!}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    networks:
      - emoeat-net

volumes:
  mysql_data:

networks:
  emoeat-net:
    driver: bridge
